name: Daily Christian Feed Update

on:
  schedule:
   - cron: '0 0,7,14,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4


      - name: Generate daily feed
        run: python generate_gb_feed.py

      - name: Commit and push updated feed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "🙏 Daily feed update - $(date +'%Y-%m-%d')"
          git push
